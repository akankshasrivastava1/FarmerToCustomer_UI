<div class="modal fade"
     #deleteModal
     id="deleteModal"
     tabindex="-1"
     aria-labelledby="deleteModalLabel"
     aria-hidden="true">

  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header" style="background: var(--danger);">
        <h5 class="modal-title fw-bold" id="deleteModalLabel">
          <i class="bi bi-exclamation-triangle me-2"></i>
          Confirm Delete
        </h5>
        <button type="button" class="btn-close" (click)="close()"></button>
      </div>

      <div class="modal-body text-center p-4">
        <div style="width:80px;height:80px;background:#ffeaee;border-radius:50%;display:flex;
                    align-items:center;justify-content:center;margin:0 auto 20px;">
          <i class="bi bi-trash" style="font-size:2rem;color:var(--danger);"></i>
        </div>

        <p class="text-muted">
          Are you sure you want to delete this
          <strong>{{ deleteType === 'ROLE' ? 'Role' : deleteType === 'CATEGORY' ? 'Category' : deleteType === 'PRODUCT' ? 'Product' : 'MasterProduct' }}</strong>?
        </p>
      </div>

      <div class="modal-footer justify-content-center">
        <button class="btn btn-outline-secondary" (click)="close()">Cancel</button>

        <button class="btn"
          style="background:var(--danger);color:#fff"
          (click)="deleteType === 'ROLE'
            ? onDeleteRole(selectedDeleteId!)
            : deleteType === 'CATEGORY'
            ? onDeleteCategory(selectedDeleteId!)
            : deleteType === 'PRODUCT'
            ? onDeleteProduct(selectedDeleteId!)
            : onDeleteProductMaster(selectedDeleteId!)">
          Delete
        </button>
      </div>

    </div>
  </div>
</div>
