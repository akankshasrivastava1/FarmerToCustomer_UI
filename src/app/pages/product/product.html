
    <!-- Product CRUD -->
    <div class="tab-pane fade show active" id="productPane" role="tabpanel" aria-labelledby="product-tab">
        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-accent" data-bs-toggle="modal" data-bs-target="#productModal">
                Add Product
            </button>
        </div>
        <div class="table-card">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th style="width: 80px;">Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th style="width: 120px; text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody>

                        <td><img src="https://images.unsplash.com/photo-1518843875459-f738682238a6?w=100&h=100&fit=crop"

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="productModalLabel"><i class="bi bi-box-seam me-2"></i>Add/Edit
                    Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="productForm">
                    <div class="row g-3">
                        <div class="col-12"><input type="hidden" id="productId" value="0"></div>
                        <div class="col-md-6">
                            <label class="form-label" for="productName"><i class="bi bi-tag me-1"
                                    style="color: var(--primary);"></i>Product Name</label>
                            <input type="text" class="form-control" id="productName" placeholder="Enter product name"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="productCategory"><i class="bi bi-folder me-1"
                                    style="color: var(--primary);"></i>Category</label>
                            <select class="form-select" id="productCategory" required>
                                <option value="">Select Category</option>
                                <option value="1">Vegetables</option>
                                <option value="2">Fruits</option>
                                <option value="3">Dairy</option>
                                <option value="4">Grains</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="productDescription"><i class="bi bi-text-paragraph me-1"
                                    style="color: var(--primary);"></i>Description</label>
                            <textarea class="form-control" id="productDescription" rows="3"
                                placeholder="Enter product description" required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="productImage"><i class="bi bi-image me-1"
                                    style="color: var(--primary);"></i>Image URL</label>
                            <input type="url" class="form-control" id="productImage"
                                placeholder="https://example.com/image.jpg">
                            <small class="text-muted">Enter a valid image URL for the product</small>
                        </div>
                        <div class="col-12">
                            <div class="border rounded p-3 text-center" style="background: var(--primary-lightest);">
                                <img id="imagePreview" src="https://via.placeholder.com/200x150?text=Product+Image"
                                    alt="Preview" style="max-width: 200px; border-radius: var(--radius-sm);">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border-top: 1px solid var(--border);">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal"
                    style="border-radius: var(--radius-sm);"><i class="bi bi-x-circle me-1"></i>Cancel</button>
                <button type="button" form="productForm" class="btn btn-primary-custom"><i
                        class="bi bi-check-circle me-2"></i>Save Product</button>
            </div>
        </div>
    </div>
</div>
