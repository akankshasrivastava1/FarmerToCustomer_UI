
<!-- Category CRUD -->
<div class="tab-pane fade show active" id="categoryPane" role="tabpanel" aria-labelledby="category-tab">
    <!-- <div class="search-filter-bar">
                            <form [formGroup]="categoryForm">
                                <div class="search-input-wrapper">
                                    <i class="bi bi-search"></i>
                                    <input type="text" formControlName="name" placeholder="Enter Category" />
                                </div>
                                <button class="btn-filter" (click)="onSaveCategory()">
                                    <i class="bi bi-funnel me-1"></i>Save Category
                                </button>
                            </form>
                        </div> -->
    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-accent" data-bs-toggle="modal" data-bs-target="#categoryModal">
            <i class="bi bi-plus-circle me-2"></i>Add Category
        </button>
    </div>
    <div class="table-card">
        <table class="table table-hover mb-0">
            <thead>

                <tr>
                    <th style="width: 100px;">Category ID</th>
                    <th>Category Name</th>
                    <th style="width: 120px; text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody>
                @for (item of categoryList(); track $index) {

                <tr>
                    <td class="font-weight-bold">{{$index+1}}</td>
                    <td>
                        <span class="category-badge admin">
                            <i class="bi bi-shield-check me-1"></i>{{item.name}}
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-2 justify-content-center">
                            <button class="action-btn action-btn-edit" title="Edit" data-bs-toggle="modal"
                                data-bs-target="#categoryModal" (click)="onCategoryEdit(item)"><i
                                    class="bi bi-pencil"></i></button>
                            <button class="action-btn action-btn-delete" title="Delete" data-bs-toggle="modal"
                                data-bs-target="#deleteModal"
                                (click)="deleteType='CATEGORY'; selectedDeleteId=item.categoryId"><i
                                    class="bi bi-trash"></i></button>
                            <!-- (click)="onDeleteCategory(item.categoryId)" -->
                        </div>
                    </td>
                </tr>
                }
                <!-- ...more sample rows... -->
            </tbody>
        </table>
    </div>
</div>
<!-- Category Modal -->
<div class="modal fade" id="categoryModal" tabindex="-1" aria-labelledby="categoryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="categoryModalLabel"><i class="bi bi-folder-plus me-2"></i>Add/Edit
                    Category</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="categoryForm" [formGroup]="categoryForm">
                    <div class="row g-3">
                        <div class="col-12"><input type="hidden" id="categoryId" value="0"></div>
                        <!-- <div class="col-12" > -->
                        <label class="form-label" for="categoryName"><i class="bi bi-tag me-1"
                                style="color: var(--primary);"></i>Category Name</label>
                        <input type="text" class="form-control" id="categoryName" formControlName="name"
                            placeholder="Enter category name (e.g., Vegetables, Fruits)" required>
                        <!-- </div> -->
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="border-top: 1px solid var(--border);">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal"
                    style="border-radius: var(--radius-sm);"><i class="bi bi-x-circle me-1"></i>Cancel</button>
                @if(categoryForm.controls['categoryId'].value == 0)
                {
                <button type="submit" class="btn btn-primary-custom" (click)="onSaveCategory()"><i
                        class="bi bi-check-circle me-2"></i>Save Category</button>
                }@else {
                <button type="submit" class="btn btn-primary-custom" (click)="onUpdateCategory()"><i
                        class="bi bi-check-circle me-2"></i>Update Category</button>
                }
            </div>
        </div>
    </div>
</div>
