<!-- Role CRUD -->
<div class="tab-pane fade" id="rolePane" role="tabpanel" aria-labelledby="role-tab">

    <!-- SEARCH AND FILTER -->
    <!-- <div class="search-filter-bar" [formGroup]="roleForm">
                                <div class="search-input-wrapper">
                                    <i class="bi bi-search"></i>
                                    <input type="text" formControlName="roleName" placeholder="Enter Role" />
                                </div>
                                <button type="button" class="btn-filter" (click)="onSaveRole()">
                                    <i class="bi bi-funnel me-1"></i>Save Role
                                </button>
                    
                        </div> -->
    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-accent" data-bs-toggle="modal" data-bs-target="#roleModal">
            <i class="bi bi-plus-circle me-2"></i>Add Role
        </button>
    </div>
    <div class="table-card">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th style="width: 100px;">Role ID</th>
                    <th>Role Name</th>
                    <th style="width: 120px; text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody>
                @for (item of roleList(); track $index) {
                <tr>
                    <td class="font-weight-bold">{{$index+1}}</td>
                    <td>
                        <span class="role-badge admin">
                            <i class="bi bi-shield-check me-1"></i>{{item.roleName}}
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-2 justify-content-center">
                            <button class="action-btn action-btn-edit" title="Edit" data-bs-toggle="modal"
                                data-bs-target="#roleModal" (click)="onRoleEdit(item)"><i
                                    class="bi bi-pencil"></i></button>
                            <button class="action-btn action-btn-delete" title="Delete" data-bs-toggle="modal"
                                data-bs-target="#deleteModal"
                                (click)="deleteType='ROLE'; selectedDeleteId=item.roleId"><i
                                    class="bi bi-trash"></i></button>
                            <!-- (click)="onDeleteRole(item.roleId)" -->
                            <button class="action-btn action-btn-delete" data-bs-toggle="modal"
                                data-bs-target="#deleteModal" (click)="deleteId = item.roleId">
                                <i class="bi bi-trash"></i>
                            </button>

                        </div>
                    </td>
                </tr>
                }

                <!-- ...more sample rows... -->
            </tbody>
        </table>
    </div>
</div>
<!-- Role Modal -->
<div class="modal fade" id="roleModal" tabindex="-1" aria-labelledby="roleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="bi bi-person-badge me-2"></i>Add/Edit
                    Role</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form [formGroup]="roleForm">
                    <div class="row g-3">
                        <div class="col-12"><input type="hidden" id="roleId" value="0"></div>
                        <!-- <div class="col-12"> -->
                        <label class="form-label"><i class="bi bi-tag me-1" style="color: var(--primary);"></i>Role
                            Name</label>
                        <input type="text" class="form-control" formControlName="roleName"
                            placeholder="Enter role name (e.g., Farmer, Customer)" required>
                    </div>
                    @if(roleForm.controls['roleId'].value == 0)
                    {
                    <button type="submit" class="btn btn-primary-custom" (click)="onSaveRole()"><i
                            class="bi bi-check-circle me-2"></i>Save Role</button>
                    }@else {
                    <button type="submit" class="btn btn-primary-custom" (click)="onUpdateRole()"><i
                            class="bi bi-check-circle me-2"></i>Update Role</button>
                    }
                    <!-- </div> -->
                    <div class="modal-footer" style="border-top: 1px solid var(--border);">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal"
                            style="border-radius: var(--radius-sm);"><i class="bi bi-x-circle me-1"></i>Cancel</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
