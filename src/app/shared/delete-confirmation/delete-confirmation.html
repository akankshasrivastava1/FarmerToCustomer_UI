<button class="btn btn-danger" (click)="deleteConfirmed.emit()" data-bs-dismiss="modal">
  Delete
</button>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header" style="background: var(--danger);">
        <h5 class="modal-title fw-bold">
          <i class="bi bi-exclamation-triangle me-2"></i>
          Confirm Delete
        </h5>
        <button type="button" class="btn-close"
                data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center p-4">
        <div
          style="width:80px;height:80px;background:#ffeaee;border-radius:50%;
                 display:flex;align-items:center;justify-content:center;
                 margin:0 auto 20px;">
          <i class="bi bi-trash" style="font-size:2rem;color:var(--danger);"></i>
        </div>

        <p class="text-muted">
          Are you sure you want to delete this
          <strong>{{ entityName }}</strong>?
        </p>
      </div>

      <div class="modal-footer justify-content-center">
        <button class="btn btn-outline-secondary"
                data-bs-dismiss="modal">
          Cancel
        </button>

        <button class="btn"
                style="background:var(--danger);color:#fff;"
                (click)="confirmDelete.emit()"
                data-bs-dismiss="modal">
          <i class="bi bi-trash me-2"></i>Delete
        </button>
      </div>

    </div>
  </div>
</div>
